<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <title>Chemical | StarchPrep</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f8fafc; }
    [v-cloak] { display: none; }
    .bg-hero { position: fixed; inset: 0; z-index: -1; background-image: url('background.webp'); background-size: cover; background-position: center; }
    .bg-overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(11,15,25,0.85), rgba(11,15,25,0.95)); z-index: -1; backdrop-filter: blur(8px); }
    .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
    .glass-card:hover { border-color: rgba(6, 182, 212, 0.5); transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(6,182,212,0.3); }
  </style>
</head>
<body class="antialiased">

<div id="app" v-cloak class="min-h-screen flex flex-col relative pb-20">
  <div class="bg-hero"></div><div class="bg-overlay"></div>

  <div class="max-w-6xl mx-auto w-full px-4 pt-8 pb-4">
    <a href="index.html" class="inline-flex items-center gap-2 bg-white/5 hover:bg-white/10 text-cyan-400 px-5 py-2.5 rounded-xl transition-all font-bold text-xs border border-white/10 shadow-lg backdrop-blur-sm">
      <i class="fa fa-arrow-left"></i> Kembali ke Dashboard
    </a>
    <div class="text-center mt-8 mb-12">
      <h1 class="text-3xl md:text-5xl font-black text-white tracking-tighter mb-4">Bahan Kimia <span class="text-cyan-400">Starch Prep</span></h1>
      <p class="text-gray-400 text-sm max-w-2xl mx-auto">Katalog material kimia yang digunakan dalam proses preparasi dan sizing kertas.</p>
    </div>
  </div>

  <main class="flex-grow max-w-6xl w-full mx-auto px-4 z-10">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div v-for="(item, index) in chemicals" :key="index" class="glass-card rounded-2xl overflow-hidden group cursor-pointer" @click="zoomImage = item">
        <div class="relative overflow-hidden h-48">
          <img :src="item.img" :alt="item.name" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
          <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-all"></div>
          <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-md p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa fa-search-plus text-cyan-400"></i></div>
        </div>
        <div class="p-6">
          <h3 class="text-lg font-bold text-white mb-2 group-hover:text-cyan-400 transition-colors">{{ item.name }}</h3>
          <p class="text-sm text-gray-400 leading-relaxed line-clamp-3">{{ item.desc }}</p>
        </div>
      </div>
    </div>
  </main>

  <div v-if="zoomImage" class="fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center p-4 backdrop-blur-md" @click.self="zoomImage = null">
    <button @click="zoomImage = null" class="absolute top-6 right-6 text-white bg-red-500 hover:bg-red-600 w-12 h-12 rounded-full font-bold shadow-lg transition-transform active:scale-90 z-50"><i class="fas fa-times text-xl"></i></button>
    
    <img :src="zoomImage.img" class="max-w-full max-h-[65vh] rounded-2xl shadow-[0_0_50px_rgba(6,182,212,0.3)] border border-gray-700 object-contain">
    
    <div class="mt-6 w-full max-w-2xl bg-black/60 p-6 rounded-2xl border border-gray-800 text-center shadow-xl">
      <h3 class="text-2xl font-black text-cyan-400 mb-3 tracking-tighter">{{ zoomImage.name }}</h3>
      <p class="text-sm md:text-base text-gray-300 leading-relaxed">{{ zoomImage.desc }}</p>
    </div>
  </div>
</div>

<script>
  Vue.createApp({
    data() {
      return {
        zoomImage: null,
        chemicals: [
          { name: 'Enzyme Amylase', img: 'enzyme.webp', desc: 'Digunakan di tangki cooker untuk menghidrolisis pati menjadi unit yang lebih kecil, meningkatkan kelarutan dan performa starch. Disuplai dari enzyme tank dengan kontrol suhu di jet cooker.' },
          { name: 'Aluminium Sulfat (Alum)', img: 'alum.webp', desc: 'Membantu mengikat agen sizing ke permukaan serat kertas, sehingga sizing lebih efektif dalam membuat kertas tahan terhadap penetrasi air.' },
          { name: 'Surface Sizing Agent', img: 'sizing.webp', desc: 'Agen pelapis untuk meningkatkan kekuatan permukaan kertas. Dicampur bersama starch di final tank sebelum disalurkan ke size press.' },
          { name: 'Defoamer', img: 'defoamer.webp', desc: 'Mencegah dan menghilangkan busa berlebih yang bisa mengganggu proses produksi. Diberikan di inlet final tank bersama alum dan sizing agent.' },
          { name: 'Retention Agent', img: 'retention.webp', desc: 'Digunakan di outlet primary screen untuk membantu retensi filler dan fiber pada lembaran kertas serta meningkatkan efisiensi penggunaan bahan.' },
          { name: 'Wet-End Starch', img: 'wetend.webp', desc: 'Starch dengan formulasi khusus untuk wet end, ditambahkan di inlet machine chest untuk meningkatkan kekuatan kering (dry strength) dan bonding antar serat.' }
        ]
      }
    }
  }).mount('#app');
</script>
</body>
</html>
